<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0E11">
<title>Sensor Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E11;
    --panel: #151A1F;
    --line: #262E35;
    --ink: #EDEFEC;
    --ink-dim: #8A938D;
    --amber: #FFA64D;
    --green: #54D67E;
    --red-axis: #FF6B5B;
    --teal-axis: #4FD8A8;
    --blue-axis: #5EC8F0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans Condensed', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 10px 5px 8px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink-dim);
    transition: background 200ms ease;
  }

  .status-pill.ok .dot { background: var(--green); }
  .status-pill.ok { color: var(--green); }
  .status-pill.bad .dot { background: var(--red-axis); }
  .status-pill.bad { color: var(--red-axis); }

  section { margin-bottom: 28px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
  }

  .touch-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .channel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .led {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1C2228;
    border: 2px solid var(--line);
    transition: background 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
  }

  .led.active {
    background: var(--amber);
    border-color: var(--amber);
    box-shadow: 0 0 14px 2px rgba(255, 166, 77, 0.55);
  }

  .ch-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }

  .axis-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }

  .axis-row + .axis-row { border-top: 1px solid var(--line); }

  .axis-label {
    width: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
  }

  .axis-row[data-axis="x"] .axis-label { color: var(--red-axis); }
  .axis-row[data-axis="y"] .axis-label { color: var(--teal-axis); }
  .axis-row[data-axis="z"] .axis-label { color: var(--blue-axis); }

  canvas {
    flex: 1;
    height: 36px;
    display: block;
  }

  .axis-value {
    width: 70px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .unit { color: var(--ink-dim); font-size: 11px; }

  .mode-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .mode-row + .mode-row { margin-top: 10px; }

  .mode-label {
    font-size: 13px;
    color: var(--ink-dim);
  }

  .mode-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink-dim);
  }

  .mode-badge.on {
    color: var(--green);
    border-color: var(--green);
    background: rgba(84, 214, 126, 0.1);
  }

  .controls-divider {
    height: 1px;
    background: var(--line);
    margin: 16px 0;
  }

  .control-block { margin-top: 16px; }
  .control-block:first-child { margin-top: 0; }

  .control-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .control-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink);
  }

  input[type="range"].slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 999px;
    background: var(--line);
    outline: none;
    cursor: pointer;
  }

  input[type="range"].slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--amber);
  }

  input[type="range"].slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--amber);
  }

  .toggle-row {
    display: flex;
    gap: 10px;
  }

  .toggle-btn {
    flex: 1;
    font-family: 'IBM Plex Sans Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.03em;
    padding: 11px 0;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #1C2228;
    color: var(--ink-dim);
    cursor: pointer;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }

  .toggle-btn:active { transform: scale(0.98); }

  .toggle-btn.active {
    background: rgba(255, 166, 77, 0.12);
    border-color: var(--amber);
    color: var(--amber);
  }

  footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  @media (prefers-reduced-motion: reduce) {
    .led, .dot { transition: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Sensor Panel</h1>
      <div class="status-pill" id="status-pill">
        <span class="dot"></span>
        <span id="status-text">CONNECTING</span>
      </div>
    </header>

    <section>
      <div class="eyebrow">TOUCH · 5 CHANNELS</div>
      <div class="panel">
        <div class="touch-grid" id="touch-grid"></div>
      </div>
    </section>

    <section>
      <div class="eyebrow">GYROSCOPE · DEG/SEC</div>
      <div class="panel">
        <div class="axis-row" data-axis="x">
          <span class="axis-label">X</span>
          <canvas id="canvas-x"></canvas>
          <span class="axis-value"><span id="value-x">0.0</span><span class="unit"> °/s</span></span>
        </div>
        <div class="axis-row" data-axis="y">
          <span class="axis-label">Y</span>
          <canvas id="canvas-y"></canvas>
          <span class="axis-value"><span id="value-y">0.0</span><span class="unit"> °/s</span></span>
        </div>
        <div class="axis-row" data-axis="z">
          <span class="axis-label">Z</span>
          <canvas id="canvas-z"></canvas>
          <span class="axis-value"><span id="value-z">0.0</span><span class="unit"> °/s</span></span>
        </div>
      </div>
    </section>

    <section>
      <div class="eyebrow">GYRO-CURSOR MODE</div>
      <div class="panel">
        <div class="mode-row">
          <span class="mode-label">Mode armed (CH1 off, CH2 on)</span>
          <span class="mode-badge" id="badge-mode">OFF</span>
        </div>
        <div class="mode-row">
          <span class="mode-label">Steering cursor (+ CH4 held)</span>
          <span class="mode-badge" id="badge-cursor">OFF</span>
        </div>
        <div class="mode-row">
          <span class="mode-label">Scrolling (CH3, +CH4 for up)</span>
          <span class="mode-badge" id="badge-scroll">OFF</span>
        </div>

        <div class="controls-divider"></div>

        <div class="control-block">
          <div class="control-label-row">
            <span class="mode-label">Sensitivity</span>
            <span class="control-value" id="sensitivity-value">4.0</span>
          </div>
          <input type="range" id="sensitivity-slider" class="slider" min="0.5" max="20" step="0.5" value="4.0">
        </div>

        <div class="control-block toggle-row">
          <button type="button" class="toggle-btn" id="invert-x-btn">Invert X</button>
          <button type="button" class="toggle-btn" id="invert-y-btn">Invert Y</button>
        </div>
      </div>
    </section>

    <footer id="footer-text">Waiting for first reading…</footer>
  </div>

<script>
  const HISTORY_LEN = 50;
  const RANGE = 250; // deg/s — matches the MPU6050's default sensitivity range

  // Build the 5 touch channel indicators
  const touchGrid = document.getElementById('touch-grid');
  const leds = [];
  for (let i = 0; i < 5; i++) {
    const ch = document.createElement('div');
    ch.className = 'channel';
    const led = document.createElement('div');
    led.className = 'led';
    const label = document.createElement('span');
    label.className = 'ch-label';
    label.textContent = 'CH ' + (i + 1);
    ch.appendChild(led);
    ch.appendChild(label);
    touchGrid.appendChild(ch);
    leds.push(led);
  }

  // Gyroscope sparklines
  const axes = ['x', 'y', 'z'];
  const colors = { x: '#FF6B5B', y: '#4FD8A8', z: '#5EC8F0' };
  const history = { x: [], y: [], z: [] };
  const canvases = {};

  function sizeCanvas(canvas) {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
  }

  axes.forEach(a => {
    const c = document.getElementById('canvas-' + a);
    canvases[a] = c;
    sizeCanvas(c);
  });

  window.addEventListener('resize', () => axes.forEach(a => sizeCanvas(canvases[a])));

  function drawSparkline(axis) {
    const canvas = canvases[axis];
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const data = history[axis];

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    if (data.length < 2) return;

    ctx.strokeStyle = colors[axis];
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((val, i) => {
      const x = (i / (HISTORY_LEN - 1)) * w;
      const clamped = Math.max(-RANGE, Math.min(RANGE, val));
      const y = h / 2 - (clamped / RANGE) * (h / 2 - 2);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function pushHistory(axis, value) {
    const arr = history[axis];
    arr.push(value);
    if (arr.length > HISTORY_LEN) arr.shift();
  }

  const statusPill = document.getElementById('status-pill');
  const statusText = document.getElementById('status-text');
  const footerText = document.getElementById('footer-text');

  function setStatus(connected) {
    statusPill.classList.toggle('ok', connected);
    statusPill.classList.toggle('bad', !connected);
    statusText.textContent = connected ? 'LINK OK' : 'NO LINK';
  }

  // --- Gyro-cursor settings: sensitivity slider + invert toggles ---
  const sensitivitySlider = document.getElementById('sensitivity-slider');
  const sensitivityValue = document.getElementById('sensitivity-value');
  const invertXBtn = document.getElementById('invert-x-btn');
  const invertYBtn = document.getElementById('invert-y-btn');

  function applySettingsToUI(data) {
    sensitivitySlider.value = data.sensitivity;
    sensitivityValue.textContent = Number(data.sensitivity).toFixed(1);
    invertXBtn.classList.toggle('active', !!data.invert_x);
    invertYBtn.classList.toggle('active', !!data.invert_y);
  }

  async function loadSettings() {
    try {
      const res = await fetch('/api/settings');
      applySettingsToUI(await res.json());
    } catch (e) {
      // Keep the slider/buttons at their defaults; they'll still work
      // once the server is reachable - pushSettings() will resync them.
    }
  }

  async function pushSettings(partial) {
    try {
      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(partial)
      });
      applySettingsToUI(await res.json());
    } catch (e) {
      footerText.textContent = 'Could not reach the server to update settings';
    }
  }

  // Live label while dragging, only sends the update on release so we
  // don't flood the server with a request per pixel of drag.
  sensitivitySlider.addEventListener('input', () => {
    sensitivityValue.textContent = Number(sensitivitySlider.value).toFixed(1);
  });
  sensitivitySlider.addEventListener('change', () => {
    pushSettings({ sensitivity: Number(sensitivitySlider.value) });
  });

  invertXBtn.addEventListener('click', () => {
    const next = !invertXBtn.classList.contains('active');
    invertXBtn.classList.toggle('active', next); // instant feedback
    pushSettings({ invert_x: next });
  });

  invertYBtn.addEventListener('click', () => {
    const next = !invertYBtn.classList.contains('active');
    invertYBtn.classList.toggle('active', next);
    pushSettings({ invert_y: next });
  });

  loadSettings();

  async function poll() {
    try {
      const res = await fetch('/api/sensors');
      const data = await res.json();

      data.touch.forEach((v, i) => { if (leds[i]) leds[i].classList.toggle('active', !!v); });

      pushHistory('x', data.gyroX);
      pushHistory('y', data.gyroY);
      pushHistory('z', data.gyroZ);
      axes.forEach(drawSparkline);

      document.getElementById('value-x').textContent = data.gyroX.toFixed(1);
      document.getElementById('value-y').textContent = data.gyroY.toFixed(1);
      document.getElementById('value-z').textContent = data.gyroZ.toFixed(1);

      setStatus(data.connected);
      document.getElementById('badge-mode').classList.toggle('on', !!data.mode_active);
      document.getElementById('badge-mode').textContent = data.mode_active ? 'ON' : 'OFF';
      document.getElementById('badge-cursor').classList.toggle('on', !!data.cursor_active);
      document.getElementById('badge-cursor').textContent = data.cursor_active ? 'ON' : 'OFF';
      const scrollBadge = document.getElementById('badge-scroll');
      scrollBadge.classList.toggle('on', data.scroll_direction && data.scroll_direction !== 'off');
      scrollBadge.textContent = data.scroll_direction === 'up' ? 'UP'
        : data.scroll_direction === 'down' ? 'DOWN'
        : 'OFF';
      footerText.textContent = data.connected
        ? 'Live · updating 5×/sec'
        : 'Arduino not responding — check the USB cable and serial port';
    } catch (e) {
      setStatus(false);
      footerText.textContent = 'Cannot reach the server';
    }
  }

  poll();
  setInterval(poll, 200);
</script>
</body>
</html>
